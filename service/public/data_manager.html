<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Data Manager</title>
        <link rel="stylesheet" href="/service/res/style.css" />
        <script src="/service/res/common.js"></script>
        <style>
            :root {
                --bg: #f0f4f8;
                --surface2: #f8fafc;
            }

            body {
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
            }

            /* ── Header ──────────────────────────────────────────────────────── */
            header {
                position: sticky;
                top: 0;
                z-index: 100;
                background: var(--primary);
                color: #fff;
                padding: 0 1.5rem;
                height: 56px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
            }
            .hdr-left {
                display: flex;
                align-items: center;
                gap: 1rem;
            }
            header h1 {
                margin: 0;
                font-size: 1.05rem;
                font-weight: 700;
                white-space: nowrap;
            }

            #fileSelect {
                background: rgba(255, 255, 255, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.3);
                color: #fff;
                padding: 0.3rem 0.6rem;
                border-radius: 4px;
                font-size: 0.875rem;
                cursor: pointer;
                min-width: 160px;
            }
            #fileSelect option {
                background: #1e3a5c;
                color: #fff;
            }

            .hdr-right {
                display: flex;
                align-items: center;
                gap: 0.25rem;
            }

            /* ── Icon buttons ────────────────────────────────────────────────── */
            .icon-btn {
                background: none;
                border: none;
                cursor: pointer;
                padding: 6px;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.15s;
                line-height: 0;
            }
            .icon-btn img {
                width: 20px;
                height: 20px;
                display: block;
                pointer-events: none;
            }

            /* White icons (on dark header) */
            .icon-btn-hdr img {
                filter: brightness(0) invert(1);
            }
            .icon-btn-hdr:hover {
                background: rgba(255, 255, 255, 0.18);
            }

            /* Neutral dark icons (on light surfaces) */
            .icon-btn-dark img {
                filter: brightness(0) opacity(0.55);
            }
            .icon-btn-dark:hover {
                background: var(--border);
            }
            .icon-btn-dark:hover img {
                filter: brightness(0) opacity(0.85);
            }

            /* Red delete icon */
            .icon-btn-del img {
                filter: brightness(0) saturate(100%) invert(37%) sepia(48%)
                    saturate(900%) hue-rotate(315deg);
            }
            .icon-btn-del:hover {
                background: rgba(217, 79, 79, 0.1);
            }

            /* Green update/done icon */
            .icon-btn-done img {
                filter: brightness(0) saturate(100%) invert(45%) sepia(55%)
                    saturate(600%) hue-rotate(90deg);
            }
            .icon-btn-done:hover {
                background: rgba(34, 139, 34, 0.1);
            }

            /* ── Main content ────────────────────────────────────────────────── */
            main {
                max-width: 680px;
                margin: 0 auto;
                padding: 1.5rem 1rem 3rem;
            }

            .empty-state {
                text-align: center;
                color: var(--text2);
                padding: 3rem 1rem;
                font-size: 0.95rem;
            }

            /* ── Cards ───────────────────────────────────────────────────────── */
            .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                margin-bottom: 1rem;
                overflow: hidden;
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            }
            .card-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0.4rem 0.6rem 0.4rem 1rem;
                border-bottom: 1px solid var(--border);
                background: var(--surface2);
            }
            .card-num {
                font-size: 0.825rem;
                font-weight: 700;
                color: var(--text2);
            }
            .card-table {
                width: 100%;
                border-collapse: collapse;
            }
            .card-table td {
                padding: 0.4rem 1rem;
                font-size: 0.9rem;
                vertical-align: top;
            }
            .card-key {
                font-weight: 600;
                color: var(--text2);
                white-space: nowrap;
                width: 1%;
                padding-right: 1.5rem !important;
            }
            .card-val {
                color: var(--text);
            }

            /* ── Modal overlay ───────────────────────────────────────────────── */
            #modalOverlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
                z-index: 200;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 1rem;
            }
            #modalOverlay[hidden] {
                display: none;
            }

            /* ── Modal ───────────────────────────────────────────────────────── */
            #modal {
                background: var(--surface);
                border-radius: 10px;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
                width: 100%;
                max-width: 520px;
                max-height: 90vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .modal-hdr {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0.4rem 0.6rem;
                border-bottom: 1px solid var(--border);
                background: var(--surface2);
                flex-shrink: 0;
            }
            .pos-controls {
                display: flex;
                align-items: center;
                gap: 2px;
            }
            #posInput {
                width: 46px;
                text-align: center;
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 0.25rem 0.2rem;
                font-size: 0.875rem;
                font-weight: 700;
                color: var(--text);
                background: var(--surface);
            }
            #posInput:focus {
                outline: none;
                border-color: var(--primary);
            }
            .modal-actions {
                display: flex;
                align-items: center;
                gap: 2px;
            }

            .modal-body {
                overflow-y: auto;
                padding: 1rem 1.25rem 1.25rem;
                flex: 1;
            }
            .field-row {
                margin-bottom: 0.85rem;
            }
            .field-label {
                display: block;
                font-size: 0.75rem;
                font-weight: 700;
                color: var(--text2);
                text-transform: uppercase;
                letter-spacing: 0.06em;
                margin-bottom: 0.3rem;
            }
            .field-input {
                width: 100%;
                padding: 0.4rem 0.6rem;
                border: 1px solid var(--border);
                border-radius: 4px;
                font-size: 0.9rem;
                color: var(--text);
                background: var(--surface2);
                resize: vertical;
                min-height: 32px;
                line-height: 1.5;
            }
            .field-input:focus {
                outline: none;
                border-color: var(--primary);
                background: #fff;
            }

            /* Strike-through state when card is marked for deletion */
            #modal.strike .field-input {
                text-decoration: line-through;
                color: var(--text2);
            }

            /* ── Toast ───────────────────────────────────────────────────────── */
            #toast {
                position: fixed;
                bottom: 2rem;
                left: 50%;
                transform: translateX(-50%) translateY(12px);
                background: var(--primary);
                color: #fff;
                padding: 0.6rem 1.4rem;
                border-radius: 100px;
                font-size: 0.875rem;
                font-weight: 600;
                opacity: 0;
                transition:
                    opacity 0.25s,
                    transform 0.25s;
                pointer-events: none;
                z-index: 999;
                max-width: calc(100vw - 2rem);
                text-align: center;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            }
            #toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        </style>
    </head>
    <body>
        <header>
            <div class="hdr-left">
                <button title="Admin Page">
                    <a href="/service"
                        ><img
                            src="/service/res/img/admin_panel_settings.svg"
                            alt="Admin Page"
                    /></a>
                </button>
                <h1>Data Manager</h1>
                <select id="fileSelect"></select>
            </div>
            <div class="hdr-right">
                <button
                    id="addBtn"
                    class="icon-btn icon-btn-hdr"
                    title="Add a new card"
                >
                    <img src="/service/res/img/add.svg" alt="Add" />
                </button>
                <button
                    id="logoutBtn"
                    class="icon-btn icon-btn-hdr"
                    title="Logout"
                >
                    <svg
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </header>

        <main id="cardList"></main>

        <div id="modalOverlay" hidden>
            <div id="modal">
                <div class="modal-hdr">
                    <div class="pos-controls">
                        <button
                            id="moveFirstBtn"
                            class="icon-btn icon-btn-dark"
                            title="Move card to beginning"
                        >
                            <img
                                src="/service/res/img/skip_previous.svg"
                                alt="Move to beginning"
                            />
                        </button>
                        <input id="posInput" type="number" min="1" />
                        <button
                            id="moveLastBtn"
                            class="icon-btn icon-btn-dark"
                            title="Move card to the end"
                        >
                            <img
                                src="/service/res/img/skip_next.svg"
                                alt="Move to end"
                            />
                        </button>
                    </div>
                    <div class="modal-actions">
                        <button
                            id="deleteBtn"
                            class="icon-btn icon-btn-del"
                            title="Delete this card"
                            hidden
                        >
                            <img
                                src="/service/res/img/delete_forever.svg"
                                alt="Delete"
                            />
                        </button>
                        <button
                            id="updateBtn"
                            class="icon-btn icon-btn-done"
                            title="Save changes"
                            hidden
                        >
                            <img src="/service/res/img/done.svg" alt="Save" />
                        </button>
                        <button
                            id="cancelBtn"
                            class="icon-btn icon-btn-dark"
                            title="Close"
                        >
                            <img src="/service/res/img/close.svg" alt="Close" />
                        </button>
                    </div>
                </div>
                <div class="modal-body" id="modalFields"></div>
            </div>
        </div>

        <div id="toast"></div>

        <script>
            const APP = {
                _data: [],
                _keys: [],
                _currentFile: null,
                _editIndex: -1, // index in _data; -1 = add-new
                _origValues: {},
                _origPos: 1,
                _pendingDel: false,
                _toastTimer: null,

                // ── Bootstrap ─────────────────────────────────────────────────────────

                async init() {
                    Auth.accessToken = await Auth.silentRefresh();
                    if (!Auth.accessToken) {
                        window.location.href = "/service/login";
                        return;
                    }

                    document
                        .getElementById("fileSelect")
                        .addEventListener("change", (e) =>
                            this._loadFile(e.target.value),
                        );
                    document
                        .getElementById("addBtn")
                        .addEventListener("click", () => this._openAdd());
                    document
                        .getElementById("logoutBtn")
                        .addEventListener("click", () => Auth.logout());
                    document
                        .getElementById("moveFirstBtn")
                        .addEventListener("click", () => {
                            document.getElementById("posInput").value = 1;
                            this._checkDirty();
                        });
                    document
                        .getElementById("moveLastBtn")
                        .addEventListener("click", () => {
                            document.getElementById("posInput").value =
                                this._maxPos();
                            this._checkDirty();
                        });
                    document
                        .getElementById("posInput")
                        .addEventListener("input", () => this._checkDirty());
                    document
                        .getElementById("updateBtn")
                        .addEventListener("click", () => this._save());
                    document
                        .getElementById("cancelBtn")
                        .addEventListener("click", () => this._closeModal());
                    document
                        .getElementById("deleteBtn")
                        .addEventListener("click", () => this._markDelete());

                    await this._loadFileList();
                },

                // ── File list ─────────────────────────────────────────────────────────

                async _loadFileList() {
                    const data = await Auth.apiFetch(
                        "GET",
                        "/service/api/data",
                    );
                    const sel = document.getElementById("fileSelect");
                    sel.innerHTML = "";
                    data.files.forEach((f) => {
                        const opt = document.createElement("option");
                        opt.value = opt.textContent = f;
                        sel.appendChild(opt);
                    });
                    if (data.files.length) this._loadFile(data.files[0]);
                },

                async _loadFile(name) {
                    this._currentFile = name;
                    const data = await Auth.apiFetch(
                        "GET",
                        `/service/api/data/${name}`,
                    );
                    this._data = data;
                    this._keys = data.length ? Object.keys(data[0]) : [];
                    this._renderCards();
                },

                // ── Card helpers ──────────────────────────────────────────────────────

                _isEmpty(record) {
                    return Object.values(record).every(
                        (v) => v === "" || v === null || v === undefined,
                    );
                },

                _renderedCards() {
                    return this._data
                        .map((record, index) => ({ index, record }))
                        .filter(({ record }) => !this._isEmpty(record));
                },

                _formatKey(key) {
                    return key
                        .replace(/_/g, " ")
                        .replace(/([a-z])([A-Z])/g, "$1 $2")
                        .replace(/\b\w/g, (c) => c.toUpperCase());
                },

                // ── Render cards ──────────────────────────────────────────────────────

                _renderCards() {
                    const list = document.getElementById("cardList");
                    list.innerHTML = "";
                    const rendered = this._renderedCards();
                    if (!rendered.length) {
                        list.innerHTML =
                            '<p class="empty-state">No records to display.</p>';
                        return;
                    }
                    rendered.forEach(({ index, record }, pos) =>
                        list.appendChild(
                            this._buildCard(index, record, pos + 1),
                        ),
                    );
                },

                _buildCard(dataIndex, record, displayNum) {
                    const card = document.createElement("div");
                    card.className = "card";

                    const hdr = document.createElement("div");
                    hdr.className = "card-header";

                    const num = document.createElement("span");
                    num.className = "card-num";
                    num.textContent = displayNum + ".";

                    const editBtn = document.createElement("button");
                    editBtn.className = "icon-btn icon-btn-dark";
                    editBtn.title = "Edit this card";
                    editBtn.innerHTML =
                        '<img src="/service/res/img/mode.svg" alt="Edit">';
                    editBtn.addEventListener("click", () =>
                        this._openEdit(dataIndex),
                    );

                    hdr.append(num, editBtn);
                    card.appendChild(hdr);

                    const table = document.createElement("table");
                    table.className = "card-table";
                    this._keys.forEach((key) => {
                        const tr = document.createElement("tr");
                        const k = document.createElement("td");
                        k.className = "card-key";
                        k.textContent = this._formatKey(key) + ":";
                        const v = document.createElement("td");
                        v.className = "card-val";
                        v.textContent = record[key] ?? "";
                        tr.append(k, v);
                        table.appendChild(tr);
                    });
                    card.appendChild(table);
                    return card;
                },

                // ── Modal open ────────────────────────────────────────────────────────

                _openEdit(dataIndex) {
                    const record = this._data[dataIndex];
                    const rendered = this._renderedCards();
                    const dispPos =
                        rendered.findIndex((c) => c.index === dataIndex) + 1;

                    this._editIndex = dataIndex;
                    this._origValues = { ...record };
                    this._origPos = dispPos;
                    this._pendingDel = false;

                    this._populateModal(record, dispPos, rendered.length);
                    document.getElementById("deleteBtn").hidden = false;
                    document.getElementById("modalOverlay").hidden = false;
                },

                _openAdd() {
                    const rendered = this._renderedCards();
                    const newPos = rendered.length + 1;
                    const empty = Object.fromEntries(
                        this._keys.map((k) => [k, ""]),
                    );

                    this._editIndex = -1;
                    this._origValues = { ...empty };
                    this._origPos = newPos;
                    this._pendingDel = false;

                    this._populateModal(empty, newPos, newPos);
                    document.getElementById("deleteBtn").hidden = true;
                    document.getElementById("modalOverlay").hidden = false;
                },

                _populateModal(record, pos, maxPos) {
                    document.getElementById("modal").classList.remove("strike");
                    document.getElementById("updateBtn").hidden = true;
                    const inp = document.getElementById("posInput");
                    inp.value = pos;
                    inp.min = 1;
                    inp.max = Math.max(1, maxPos);

                    const fields = document.getElementById("modalFields");
                    fields.innerHTML = "";
                    this._keys.forEach((key) => {
                        const row = document.createElement("div");
                        row.className = "field-row";
                        const lbl = document.createElement("label");
                        lbl.className = "field-label";
                        lbl.textContent = this._formatKey(key);
                        const ta = document.createElement("textarea");
                        ta.className = "field-input";
                        ta.dataset.key = key;
                        ta.value = record[key] ?? "";
                        ta.rows = 1;
                        ta.addEventListener("input", () => this._checkDirty());
                        row.append(lbl, ta);
                        fields.appendChild(row);
                    });
                },

                // ── Dirty state ───────────────────────────────────────────────────────

                _maxPos() {
                    const rendered = this._renderedCards();
                    return this._editIndex === -1
                        ? rendered.length + 1
                        : rendered.length;
                },

                _checkDirty() {
                    if (this._pendingDel) {
                        document.getElementById("updateBtn").hidden = false;
                        return;
                    }

                    const currentPos =
                        parseInt(document.getElementById("posInput").value) ||
                        0;
                    const posChanged = currentPos !== this._origPos;

                    let fieldsChanged = false;
                    let hasContent = false;
                    document
                        .querySelectorAll("#modalFields .field-input")
                        .forEach((ta) => {
                            if (
                                ta.value !==
                                String(this._origValues[ta.dataset.key] ?? "")
                            )
                                fieldsChanged = true;
                            if (ta.value.trim()) hasContent = true;
                        });

                    // Add-new: require at least one field to have content before enabling save
                    const isDirty =
                        this._editIndex === -1
                            ? hasContent
                            : posChanged || fieldsChanged;

                    document.getElementById("updateBtn").hidden = !isDirty;
                },

                // ── Delete mark ───────────────────────────────────────────────────────

                _markDelete() {
                    this._pendingDel = true;
                    document.getElementById("modal").classList.add("strike");
                    document.getElementById("updateBtn").hidden = false;
                    this._showToast(
                        "This card will be deleted. Update to confirm, else Cancel.",
                    );
                },

                // ── Save ──────────────────────────────────────────────────────────────

                _clamp(v, lo, hi) {
                    return Math.max(lo, Math.min(hi, v));
                },

                _getModalValues() {
                    const vals = {};
                    document
                        .querySelectorAll("#modalFields .field-input")
                        .forEach((ta) => {
                            vals[ta.dataset.key] = ta.value;
                        });
                    return vals;
                },

                async _save() {
                    const rendered = this._renderedCards();
                    const empties = this._data.filter((r) => this._isEmpty(r));
                    let newData;

                    if (this._pendingDel) {
                        const remaining = rendered
                            .filter((c) => c.index !== this._editIndex)
                            .map((c) => c.record);
                        newData = remaining.length
                            ? [...empties, ...remaining]
                            : [
                                  Object.fromEntries(
                                      this._keys.map((k) => [k, ""]),
                                  ),
                              ];
                    } else if (this._editIndex === -1) {
                        // Add new
                        const newRecord = Object.fromEntries(
                            this._keys.map((k) => [
                                k,
                                this._getModalValues()[k] ?? "",
                            ]),
                        );
                        const pos = this._clamp(
                            parseInt(
                                document.getElementById("posInput").value,
                            ) || 1,
                            1,
                            rendered.length + 1,
                        );
                        const realList = rendered.map((c) => c.record);
                        realList.splice(pos - 1, 0, newRecord);
                        newData = [...empties, ...realList];
                    } else {
                        // Update + reorder
                        const updated = Object.fromEntries(
                            this._keys.map((k) => [
                                k,
                                this._getModalValues()[k] ?? "",
                            ]),
                        );
                        const pos = this._clamp(
                            parseInt(
                                document.getElementById("posInput").value,
                            ) || 1,
                            1,
                            rendered.length,
                        );
                        const otherReal = rendered
                            .filter((c) => c.index !== this._editIndex)
                            .map((c) => c.record);
                        otherReal.splice(pos - 1, 0, updated);
                        newData = [...empties, ...otherReal];
                    }

                    await Auth.apiFetch(
                        "PUT",
                        `/service/api/data/${this._currentFile}`,
                        newData,
                    );
                    const fresh = await Auth.apiFetch(
                        "GET",
                        `/service/api/data/${this._currentFile}`,
                    );
                    this._data = fresh;
                    this._renderCards();
                    this._closeModal();
                },

                // ── Modal close ───────────────────────────────────────────────────────

                _closeModal() {
                    document.getElementById("modalOverlay").hidden = true;
                    document.getElementById("modal").classList.remove("strike");
                    this._editIndex = -1;
                    this._pendingDel = false;
                },

                // ── Toast ─────────────────────────────────────────────────────────────

                _showToast(msg) {
                    const el = document.getElementById("toast");
                    el.textContent = msg;
                    el.classList.add("show");
                    clearTimeout(this._toastTimer);
                    this._toastTimer = setTimeout(
                        () => el.classList.remove("show"),
                        5000,
                    );
                },
            };

            APP.init();
        </script>
    </body>
</html>
