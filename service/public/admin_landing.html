<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <link rel="stylesheet" href="/service/res/style.css">
  <script src="/service/res/common.js"></script>
  <style>
    body {
      background: #f0f4f8;
      min-height: 100vh;
    }
    header {
      background: var(--primary);
      color: #fff;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.02em; }
    .hdr-right { display: flex; align-items: center; gap: 1rem; }
    #username-badge {
      font-size: 0.85rem;
      opacity: 0.8;
    }
    #logout-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 0.3rem 0.9rem;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #logout-btn:hover { background: rgba(255,255,255,0.25); }
    main {
      padding: 2.5rem 2rem;
      max-width: 760px;
      margin: 0 auto;
    }
    #loading { color: #666; }
    #content { display: none; }
    h2 { margin: 0 0 1.5rem; font-size: 1.3rem; color: var(--primary); }
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .nav-card {
      display: block;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      text-decoration: none;
      color: #111;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .nav-card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 16px rgba(30,58,92,0.12);
    }
    .nav-card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }
    .nav-card-desc {
      font-size: 0.825rem;
      color: var(--text2);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <header>
    <h1>Admin</h1>
    <div class="hdr-right">
      <span id="username-badge"></span>
      <button id="logout-btn">Logout</button>
    </div>
  </header>
  <main>
    <p id="loading">Authenticating…</p>
    <div id="content">
      <h2>Tools</h2>
      <div class="nav-grid">
        <a class="nav-card" href="/service/spark/">
          <div class="nav-card-title">Spark Saver</div>
          <div class="nav-card-desc">Capture and manage sparks of inspiration.</div>
        </a>
        <a class="nav-card" href="/service/data-manager/">
          <div class="nav-card-title">Data Manager</div>
          <div class="nav-card-desc">View and edit JSON data files.</div>
        </a>
      </div>
    </div>
  </main>
  <script>
    async function init() {
      Auth.accessToken = await Auth.silentRefresh();
      if (!Auth.accessToken) { window.location.href = '/service/login'; return; }
      const { username } = Auth.parseJwtPayload(Auth.accessToken);
      document.getElementById('username-badge').textContent = username;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }

    document.getElementById('logout-btn').addEventListener('click', () => Auth.logout());
    init();
  </script>
</body>
</html>
