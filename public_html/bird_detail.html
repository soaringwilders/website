<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="base_res/img/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bird Detail — Soaring Wild</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=Public+Sans:wght@400&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="base_res/style.css" />
        <link rel="stylesheet" href="base_res/explorer.css" />
        <style>
            .site-header {
                position: sticky;
                top: 0;
                background: var(--dark);
            }
        </style>
    </head>
    <body>
        <header class="site-header">
            <a href="/" class="logo-box"
                ><img src="base_res/img/SoWi_title_light.png"
            /></a>
            <ul class="site-nav">
                <li><a href="/#about">About Us</a></li>
                <li><a href="/#projects">Our Projects</a></li>
                <li><a href="resources.html">Resources</a></li>
            </ul>
        </header>

        <main>
            <div class="bd-page-nav">
                <a href="traits_constellation.html" class="page-back" id="back-link"
                    >&larr; Traits Constellation</a
                >
            </div>
            <p id="bd-status" style="max-width:780px;margin:0.5rem auto 0;padding:0 1rem;color:#888;font-size:0.85rem"></p>
            <div id="bd-content" class="bd-page-wrap"></div>
        </main>

        <ul class="mobile-nav" role="navigation" aria-label="Main navigation">
            <li><a href="/#about">About Us</a></li>
            <li><a href="/#projects">Our Projects</a></li>
            <li><a href="resources.html">Resources</a></li>
        </ul>

        <script src="base_res/bird_data.js"></script>
        <script src="base_res/bird_detail.js"></script>
        <script>
            (async function () {
                const params = new URLSearchParams(location.search);
                const targetId = params.get("id");
                const targetGenus = params.get("genus");
                const targetSpecies = params.get("species");
                const statusEl = document.getElementById("bd-status");
                const contentEl = document.getElementById("bd-content");

                if (!targetId && (!targetGenus || !targetSpecies)) {
                    statusEl.textContent =
                        "No bird specified. Use ?id=<ID> or ?genus=<Genus>&species=<species> in the URL.";
                    return;
                }

                statusEl.textContent = "Loading…";
                try {
                    const rows = await BirdData.load();
                    let row;
                    if (targetId) {
                        row = rows.find(r => String(r.ID) === targetId);
                    } else {
                        const g = targetGenus.toLowerCase();
                        const s = targetSpecies.toLowerCase();
                        row = rows.find(
                            r =>
                                String(r.GENUS || "").toLowerCase() === g &&
                                String(r.SPECIES || "").toLowerCase() === s
                        );
                    }
                    if (!row) {
                        statusEl.textContent = "Bird not found.";
                        return;
                    }
                    statusEl.textContent = "";
                    document.title = `${row.COMMON_NAME || "Bird Detail"} — Soaring Wild`;
                    BirdDetail.renderPage(row, contentEl);
                } catch (err) {
                    statusEl.textContent = `Error: ${err.message}`;
                }
            })();
        </script>
    </body>
</html>
