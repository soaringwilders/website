      - generic [ref=e31]:
        - generic [ref=e32]:
          - heading "How to use it" [level=3] [ref=e33]
          - paragraph [ref=e34]:
            - text: Every
            - strong [ref=e35]: node
            - text: is a behavior — a social style, a mating system, a nest type, or a movement pattern. Every
            - strong [ref=e36]: edge
            - text: connects two behaviors that show up together in the same species more than expected — the closer two nodes cluster, the more they travel as a package. Node size is the number of species with that trait; edge thickness is the strength of the association.
          - paragraph [ref=e37]:
            - strong [ref=e38]: Drag
            - text: a node to explore its neighborhood — it snaps back into the simulation when you let go.
            - strong [ref=e39]: Double-click
            - text: a node to pin it in place while you compare others.
            - strong [ref=e40]: Hover
            - text: a node or edge for details, or
            - strong [ref=e41]: click
            - text: one to list its supporting species below (click a species to open its full profile).
          - paragraph [ref=e42]:
            - strong [ref=e43]: Metric
            - text: "switches how \"association\" is measured:"
            - strong [ref=e44]: Jaccard
            - text: is the share of species with either trait that have both — good for finding common pairings.
            - strong [ref=e45]: Lift
            - text: is how much more often two traits co-occur than pure chance would predict — better at surfacing rare, surprising pairings (a small node like
            - emphasis [ref=e46]: Lekking
            - text: can still light up a high-lift edge even though it only covers a handful of species). Every candidate pair is first required to share at least 5 species (3 within a single Order) before either metric is computed, so a co-occurrence of one or two species can never appear as an edge just because the
            - strong [ref=e47]: Min.
            - text: slider is turned all the way down.
          - paragraph [ref=e48]:
            - strong [ref=e49]: Group by Order
            - text: recomputes every association within just that taxonomic group, so you can check whether a syndrome (e.g. the social/colonial cluster) holds dataset-wide or is really a Passeriformes thing. Only Orders with enough species to support the math are listed; smaller Orders would show almost no edges even at their loosest setting.
